[paths]
# Final merged outputs
raw_results_csv = results/sample_results.csv
summary_results_csv = results/summary_results.csv

# Per-grid CSVs: one file per (valuation_mode, diffusion_strategy)
per_run_dir = results/per_run

# Plot output directory
plot_dir = results/plots

[simulation]
# Seeds are generated as range(seed_start, seed_start + seed_count)
seed_start = 0
seed_count = 12

# Comma-separated lists
sizes = 200
topologies = line,star,tree,er,ba
valuation_modes = uniform,lognormal,depth_biased
diffusion_strategies = full,probabilistic
mechanisms = modified_vcg,idm

# Used only when diffusion_strategy = probabilistic
invite_prob = 0.70

[topology]
# Graph generator knobs
tree_branching = 2
ba_m = 2
er_p_max = 0.25
er_p_scale = 3.0
